<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicken Rate Calculator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1a0a00 0%, #3d1a00 40%, #1a0a00 100%);
    font-family: Georgia, serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .header { text-align: center; margin-bottom: 30px; }
  .emoji { font-size: 50px; }
  h1 { color: #ffb347; font-size: 26px; letter-spacing: 2px; text-transform: uppercase; margin: 8px 0 4px; text-shadow: 0 2px 20px rgba(255,140,0,0.5); }
  .subtitle { color: #c87941; font-size: 13px; letter-spacing: 1px; }
  .card {
    width: 100%; max-width: 440px;
    background: rgba(255,140,0,0.12);
    border: 1.5px solid rgba(255,140,0,0.35);
    border-radius: 16px;
    padding: 22px 24px;
    margin-bottom: 16px;
  }
  label { color: #ffb347; font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase; display: block; margin-bottom: 10px; }
  .input-row { display: flex; align-items: center; gap: 10px; }
  .currency { color: #ff8c00; font-weight: bold; font-size: 20px; }
  input {
    flex: 1; background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,140,0,0.3);
    border-radius: 8px; padding: 10px 14px;
    color: #fff; font-size: 22px; font-family: monospace;
    outline: none; width: 100%;
  }
  input::placeholder { color: rgba(255,255,255,0.3); font-size: 16px; }
  .unit { color: #c87941; font-size: 13px; }
  .result-box {
    background: rgba(255,140,0,0.15); border-radius: 10px;
    padding: 14px 16px; display: flex;
    justify-content: space-between; align-items: center;
    margin-top: 14px;
  }
  .result-label { color: #c87941; font-size: 13px; }
  .result-value { color: #ffb347; font-size: 26px; font-weight: bold; font-family: monospace; }
  .rate-hint { color: #ff8c00; font-size: 12px; margin-top: 8px; opacity: 0.8; }
  .presets { width: 100%; max-width: 440px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 16px 20px; margin-bottom: 16px; }
  .preset-title { color: #c87941; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
  .preset-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .preset-btn {
    background: rgba(255,140,0,0.15); border: 1.5px solid transparent;
    border-radius: 10px; padding: 10px 6px; text-align: center;
    cursor: pointer; transition: all 0.2s;
  }
  .preset-btn:hover { border-color: #ff8c00; background: rgba(255,140,0,0.25); }
  .preset-btn:active { transform: scale(0.96); }
  .preset-g { color: #ffb347; font-size: 13px; font-weight: bold; }
  .preset-p { color: #c87941; font-size: 11px; margin-top: 3px; }
  .footer { color: rgba(200,121,65,0.5); font-size: 11px; text-align: center; margin-top: 4px; letter-spacing: 0.5px; }
</style>
</head>
<body>

<div class="header">
  <div class="emoji">🍗</div>
  <h1>Chicken Rate Calculator</h1>
  <p class="subtitle">Set rate · Calculate amount · Find grams</p>
</div>

<div class="card">
  <label>📌 Today's Chicken Rate (per kg)</label>
  <div class="input-row">
    <span class="currency">₨</span>
    <input type="number" id="rateInput" placeholder="e.g. 230" oninput="calculate()">
    <span class="unit">/ kg</span>
  </div>
  <p class="rate-hint" id="rateHint"></p>
</div>

<div class="card">
  <label>💰 I have this much money →</label>
  <div class="input-row">
    <span class="currency">₨</span>
    <input type="number" id="amountInput" placeholder="Enter amount (e.g. 150)" oninput="calculate()">
  </div>
  <div class="result-box">
    <span class="result-label">You will get</span>
    <span class="result-value" id="gramsResult">— g</span>
  </div>
</div>

<div class="card">
  <label>⚖️ I want this many grams →</label>
  <div class="input-row">
    <input type="number" id="gramsInput" placeholder="Enter grams (e.g. 500)" oninput="calculate()">
    <span class="unit">g</span>
  </div>
  <div class="result-box">
    <span class="result-label">You will pay</span>
    <span class="result-value" id="costResult">₨ —</span>
  </div>
</div>

<div class="presets" id="presetsBox" style="display:none">
  <p class="preset-title">⚡ Quick Reference</p>
  <div class="preset-grid" id="presetGrid"></div>
</div>

<p class="footer">Set today's rate · Calculate instantly</p>

<script>
function calculate() {
  const rate = parseFloat(document.getElementById('rateInput').value);
  const amount = parseFloat(document.getElementById('amountInput').value);
  const grams = parseFloat(document.getElementById('gramsInput').value);

  const hint = document.getElementById('rateHint');
  if (rate > 0) {
    hint.textContent = '≈ ₨' + (rate/1000).toFixed(3) + ' per gram';
  } else {
    hint.textContent = '';
  }

  const gramsResult = document.getElementById('gramsResult');
  if (amount > 0 && rate > 0) {
    const g = (amount / rate) * 1000;
    gramsResult.textContent = fmt(g) + ' g' + (g >= 1000 ? ' (' + fmt(g/1000) + ' kg)' : '');
  } else {
    gramsResult.textContent = '— g';
  }

  const costResult = document.getElementById('costResult');
  if (grams > 0 && rate > 0) {
    const cost = (grams / 1000) * rate;
    costResult.textContent = '₨ ' + fmt(cost);
  } else {
    costResult.textContent = '₨ —';
  }

  const presetsBox = document.getElementById('presetsBox');
  const presetGrid = document.getElementById('presetGrid');
  if (rate > 0) {
    presetsBox.style.display = 'block';
    presetGrid.innerHTML = '';
    [250, 500, 750, 1000].forEach(g => {
      const price = fmt((g / 1000) * rate);
      const btn = document.createElement('div');
      btn.className = 'preset-btn';
      btn.innerHTML = `<div class="preset-g">${g}g</div><div class="preset-p">₨${price}</div>`;
      btn.onclick = () => {
        document.getElementById('gramsInput').value = g;
        calculate();
      };
      presetGrid.appendChild(btn);
    });
  } else {
    presetsBox.style.display = 'none';
  }
}

function fmt(n) {
  if (isNaN(n) || !isFinite(n)) return '—';
  return parseFloat(n.toFixed(1)).toLocaleString();
}
</script>
</body>
</html>
